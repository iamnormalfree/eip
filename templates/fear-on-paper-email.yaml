id: fear-on-paper-email
version: 2.0.0
name: Fear on Paper Email
description: Email template for Fear on Paper content with mechanism-first structure
type: email

required_blocks:
  mechanism_clarity: "Explain mechanism in plain language"
  micro_test: "Include one 10-minute action"
  evidence_signal: "Include one source/date signal"
  boundary_line: "State when this does not apply"

structure:
  subject_line:
    options:
      - "How [TOPIC] actually works: mechanism breakdown"
      - "The mechanism behind [TOPIC] (and what it means for you)"
      - "What the research shows about [TOPIC]"

  preheader:
    text: "Here's how the mechanism actually works..."

  header:
    headline: "Understanding the mechanism behind [TOPIC]"
    subheadline: "What the evidence shows"

  body:
    - paragraph: "The mechanism at work here is [MECHANISM_DESCRIPTION]."
      block_type: mechanism_clarity
    - paragraph: "You can test this yourself in 10 minutes: [10_MINUTE_ACTION]"
      block_type: micro_test
    - paragraph: "According to [SOURCE_NAME] ([PUBLICATION_DATE]), [EVIDENCE_POINT]."
      block_type: evidence_signal
    - paragraph: "Important: This does not apply when [BOUNDARY_CONDITION]."
      block_type: boundary_line

  cta_button:
    text: "Learn more (no commitment)"
    url: "[RESOURCE_PAGE_URL]"

  footer:
    disclaimer: "Educational content only. Do your own research."
    unsubscribe: "Unsubscribe from these emails"

variables:
  - TOPIC
  - MECHANISM_DESCRIPTION
  - 10_MINUTE_ACTION
  - SOURCE_NAME
  - PUBLICATION_DATE
  - EVIDENCE_POINT
  - BOUNDARY_CONDITION
  - RESOURCE_PAGE_URL
