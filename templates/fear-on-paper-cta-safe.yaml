id: fear-on-paper-cta-safe
version: 2.0.0
name: Fear on Paper CTA (Safe)
description: Safe call-to-action template with mechanism-first structure and compliance guidelines
type: cta

required_blocks:
  mechanism_clarity: "Explain mechanism in plain language"
  micro_test: "Include one 10-minute action"
  boundary_line: "State when this does not apply"
  evidence_signal: "Include one source/date signal"

structure:
  headline:
    text: "What to do next"
    alignment: center

  mechanism_block:
    text: "The mechanism works like this: [MECHANISM_EXPLANATION]"
    block_type: mechanism_clarity

  micro_test_block:
    text: "Test it yourself in 10 minutes: [CONCRETE_ACTION]"
    block_type: micro_test

  boundary_block:
    text: "This applies when: [APPLICABLE_CONDITION] | This does NOT apply when: [NON_APPLICABLE_CONDITION]"
    block_type: boundary_line

  evidence_block:
    text: "Learn more: [SOURCE_NAME] ([DATE])"
    block_type: evidence_signal

  options:
    - id: learn_more
      button_text: "Learn more about [TOPIC]"
      description: "Get our comprehensive guide to understanding [TOPIC]"
      type: informational

    - id: free_consultation
      button_text: "Book a free consultation"
      description: "Speak with an expert about your specific situation"
      type: conversion

    - id: download_checklist
      button_text: "Download our free checklist"
      description: "Get our step-by-step checklist for [TOPIC]"
      type: lead_magnet

  compliance_notice:
    text: "This content is for educational purposes only and does not constitute financial advice."
    placement: below_cta

variables:
  - TOPIC
  - MECHANISM_EXPLANATION
  - CONCRETE_ACTION
  - APPLICABLE_CONDITION
  - NON_APPLICABLE_CONDITION
  - SOURCE_NAME
  - DATE
  - BUTTON_TEXT
  - CTA_TYPE
