id: fear-on-paper-shorts
version: 2.0.0
name: Fear on Paper Shorts
description: Short-form video template for Fear on Paper content with mechanism-first structure
type: shorts

required_blocks:
  mechanism_clarity: "One sentence mechanism"
  micro_test: "One concrete action"
  boundary_line: "One limitation"
  evidence_signal: "One source/date signal"

structure:
  hook:
    text: "The mechanism behind [TOPIC] explained in 30 seconds"
    duration: "0-3 seconds"

  setup:
    text: "Most assume [COMMON_BELIEF], but the actual mechanism is [MECHANISM]"
    duration: "3-10 seconds"

  reveal:
    text: "Test it yourself: [CONCRETE_ACTION]"
    duration: "10-25 seconds"

  cta:
    text: "One limitation to know: [LIMITATION] | Source: [SOURCE] ([DATE])"
    duration: "25-30 seconds"

variables:
  - TOPIC
  - COMMON_BELIEF
  - MECHANISM
  - CONCRETE_ACTION
  - LIMITATION
  - SOURCE
  - DATE
