id: fear-on-paper-script
version: 2.0.0
name: Fear on Paper Script
description: Video script template for Fear on Paper content with mechanism-first structure
type: script

required_blocks:
  mechanism_clarity: "Clear explanation of the underlying mechanism"
  counterexample: "Edge case or boundary condition"
  micro_test: "One concrete move testable in 10 minutes"
  boundary_line: "Explicit limitations"
  evidence_signal: "Source citation within 7 days"

structure:
  intro:
    hook: "What is the underlying mechanism behind [TOPIC]?"
    setup: "The common assumption is [COMMON_BELIEF], but here's how it actually works."
    thesis: "Today I'm going to explain the mechanism and show you a testable approach."

  body:
    - section: Mechanism Explanation
      content: "The underlying mechanism works like this: [MECHANISM_DESCRIPTION]"
      block_type: mechanism_clarity
    - section: Edge Case / Counterexample
      content: "However, this doesn't apply when [EDGE_CASE]"
      block_type: counterexample
    - section: Micro Test
      content: "You can test this in 10 minutes: [CONCRETE_ACTION]"
      block_type: micro_test
    - section: Boundary Line
      content: "This approach has limits: [EXPLICIT_LIMITATIONS]"
      block_type: boundary_line
    - section: Evidence Signal
      content: "Source: [SOURCE_NAME] ([DATE]) - [SOURCE_LINK]"
      block_type: evidence_signal

  outro:
    summary: "Key mechanism: [KEY_MECHANISM]"
    cta: "Test this yourself and draw your own conclusions."

variables:
  - TOPIC
  - COMMON_BELIEF
  - MECHANISM_DESCRIPTION
  - EDGE_CASE
  - CONCRETE_ACTION
  - EXPLICIT_LIMITATIONS
  - SOURCE_NAME
  - DATE
  - SOURCE_LINK
  - KEY_MECHANISM
