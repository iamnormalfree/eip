# ABOUTME: Singapore Mortgage Calculator Educational IP
# ABOUTME: Generates comprehensive educational content about Singapore mortgage calculations and MAS guidelines

id: calculator
version: 1.0.0
purpose: "Generate educational content about Singapore mortgage calculations, TDSR, MSR, and MAS guidelines."

operators:
  - name: FINANCIAL_CONCEPT_EXPLAINER
    spec: "Explain key mortgage and regulatory concepts in plain language before calculations."
  - name: STEP_BY_STEP_GUIDE
    spec: "Break down each formula and required input sequentially."
  - name: EXAMPLE_CALCULATOR
    spec: "Include worked examples with realistic Singapore mortgage scenarios."
  - name: COMPLIANCE_HIGHLIGHTER
    spec: "Anchor claims to MAS guidance and include compliance caveats."
  - name: RISK_ASSESSMENT_FRAMEWORK
    spec: "Describe downside scenarios, uncertainty, and borrower-specific variability."
  - name: COMPARISON_ANALYSIS
    spec: "Compare loan structures and trade-offs under clear criteria."

invariants:
  - "Must include MAS compliance references."
  - "Must explain calculation methodology."
  - "Must include step-by-step examples."
  - "Must include risk warnings and disclaimers."
  - "Must include an interactive calculator demonstration."
  - "Should compare loan types."
  - "Should include case studies."
  - "Should include an FAQ section."
  - "Should include additional resources."

sections:
  - Overview & Purpose
  - Key Singapore Mortgage Regulations
  - Calculation Methods Step-by-Step
  - Interactive Examples
  - Risk Assessment & Considerations
  - Frequently Asked Questions
  - Resources & Tools

repair_moves:
  add_mas_reference:
    description: "Add MAS regulatory reference with source link"
    template: "Source: MAS [{regulation}](https://www.mas.gov.sg/{path})"
  include_disclaimer:
    description: "Add financial advice disclaimer"
    template: "Disclaimer: This content is for educational purposes only and does not constitute financial advice"
  add_example_calculation:
    description: "Add step-by-step calculation example"
    template: "Example: Property Price $X -> Maximum Loan $Y (LTV Z%) -> Monthly Payment $A"
